<!DOCTYPE html>
<html>
<head>
  <title>Stealth Login</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h2>🔐 Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAClXwYAbKBec_Mc6XQT9ttNCQJTwlV2UU",
  authDomain: "stealthdeveloperfiles.firebaseapp.com",
  projectId: "stealthdeveloperfiles",
  storageBucket: "stealthdeveloperfiles.firebasestorage.app",
  messagingSenderId: "918965438979",
  appId: "1:918965438979:web:6634ab5caf697c116d9c36"
};

firebase.initializeApp(firebaseConfig);
</script>
<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "files.html";
    })
    .catch((error) => {
      document.getElementById("msg").innerText = "Accesso negato";
    });
}
</script>

</body>
</html>
