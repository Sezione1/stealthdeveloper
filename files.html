<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title translate="no">StealthFiles</title>
    <link rel="icon" href="logo.png">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .mainPage {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #files {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* HEADER */
        .header {
            padding: 15px;
            text-align: center;
            background: #000;
            font-size: 20px;
        }

        /* GRID CARTELLE */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .icon {
            font-size: 40px;
        }

        /* LISTA FILE */
        .fileList {
            padding: 10px;
        }

        .fileRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #161b22;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 14px;
            transition: 0.2s;
        }

        .fileRow:hover {
            background: #21262d;
            transform: translateY(-1px);
        }

        .leftSide {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .fileIcon {
            font-size: 26px;
            width: 32px;
            text-align: center;
        }

        .fileInfo {
            flex: 1;
            min-width: 0;
        }

        .fileName {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .fileMeta {
            font-size: 11px;
            opacity: 0.65;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .iconBtn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 10px;
            background: #30363d;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .iconBtn:hover {
            background: #58a6ff;
        }

        .danger:hover {
            background: #da3633;
        }


        /* UPLOAD */
        .uploadBox {
            padding: 10px;
        }

        .progress {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 4px;
        }

        .bar {
            height: 6px;
            background: #00ff99;
            width: 0%;
        }

        /* BOTTONI */
        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #00ff99;
            font-weight: bold;
        }

        .back {
            margin: 10px;
        }

        .upload-btn {
            background: linear-gradient(45deg, #00ff99, #00ccff);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        .upload-btn:hover {
            opacity: 0.8;
        }

        #fileInfo {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        progress {
            width: 100%;
            height: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="mainPage">

        <div class="header">📂 Stealth Files</div>

        <!-- UPLOAD -->
        <div class="uploadBox" id="uploadBox" style="display:none;">

            <input type="file" id="fileInput" hidden>

            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                📁 Choose file
            </button>

            <div id="fileInfo"></div>

            <div id="progressContainer" style="display:none;">
                <progress id="progressBar" value="0" max="100"></progress>
            </div>

            <button class="upload-btn" onclick="uploadFile()">
                ⬆ Upload
            </button>

        </div>

        <!-- CARTELLE -->
        <div class="container" id="folders"></div>

    </div>
    <!-- FILE -->
    <div class="fileList" id="files" style="display:none;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAClXwYAbKBec_Mc6XQT9ttNCQJTwlV2UU",
            authDomain: "stealthdeveloperfiles.firebaseapp.com",
            projectId: "stealthdeveloperfiles",
            storageBucket: "stealthdeveloperfiles.firebasestorage.app",
            messagingSenderId: "918965438979",
            appId: "1:918965438979:web:6634ab5caf697c116d9c36"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const storage = firebase.storage();

        let currentFolder = "";

        // LOGIN CHECK
        auth.onAuthStateChanged(user => {
            if (user) {
                loadFolders();
            } else {
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "login.html";
                    }
                }, 500);
            }
        });

        // 📂 CARICA CARTELLE
        function loadFolders() {
            const container = document.getElementById("folders");
            container.innerHTML = "";

            storage.ref("StealthFiles").listAll().then(res => {
                res.prefixes.forEach(folder => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `<div class="icon">📁</div>${folder.name}`;
                    div.onclick = () => openFolder(folder.name);
                    container.appendChild(div);
                });
            });
        }

        // 📂 APRI CARTELLA
        function openFolder(name) {
            currentFolder = name;
            history.pushState({ folder: true }, "");
            document.getElementById("folders").style.display = "none";
            document.getElementById("files").style.display = "block";
            document.getElementById("uploadBox").style.display = "block";
            // 🔥 RESET QUI
            resetUploadUI();
            loadFiles();
        }

        // 🔙 TORNA
        function goBack() {
            document.getElementById("folders").style.display = "grid";
            document.getElementById("files").style.display = "none";
            document.getElementById("uploadBox").style.display = "none";
        }

        // 📄 CARICA FILE
        function loadFiles() {

            const list = document.getElementById("files");
            list.innerHTML = "Loading...";

            storage.ref("StealthFiles/" + currentFolder).listAll().then(res => {

                res.items.forEach(item => {

                    item.getDownloadURL().then(url => {

                        item.getMetadata().then(meta => {

                            let fullName = item.name;
                            let shortName = fullName;

                            if (shortName.length > 28) {
                                shortName =
                                    shortName.substring(0, 18) +
                                    "..." +
                                    shortName.slice(-7);
                            }

                            const d = new Date(meta.timeCreated);

                            const data = d.toLocaleDateString();
                            const ora = d.toLocaleTimeString([], {
                                hour: '2-digit',
                                minute: '2-digit'
                            });

                            const size =
                                (meta.size / 1024 / 1024).toFixed(1) + " MB";

                            let icon = "📄";

                            if (fullName.match(/\.(jpg|jpeg|png|gif|webp)$/i)) icon = "🖼";
                            else if (fullName.match(/\.(mp4|avi|mkv|mov)$/i)) icon = "🎬";
                            else if (fullName.match(/\.(mp3|wav)$/i)) icon = "🎵";
                            else if (fullName.match(/\.(zip|rar|7z)$/i)) icon = "🗜";
                            else if (fullName.match(/\.(apk)$/i)) icon = "📱";
                            else if (fullName.match(/\.(exe)$/i)) icon = "💻";
                            else if (fullName.match(/\.(pdf)$/i)) icon = "📕";

                            const row = document.createElement("div");
                            row.className = "fileRow";

                            row.innerHTML = `
                    <div class="leftSide">

                        <div class="fileIcon">${icon}</div>

                        <div class="fileInfo">
                            <div class="fileName"
                            onclick="openFile('${url}','${fullName}')">
                            ${shortName}
                            </div>

                            <div class="fileMeta">
                                ${data} • ${ora} • ${size}
                            </div>
                        </div>

                    </div>

                    <div class="actions">

                        <button class="iconBtn"
                        onclick="downloadFile('${url}','${fullName}')">📥</button>

                        <button class="iconBtn"
                        onclick="copyLink('${url}')">🔗</button>

                        <button class="iconBtn danger"
                        onclick="deleteFile('${item.fullPath}')">🗑</button>

                    </div>
                    `;

                            list.appendChild(row);

                        });

                    });

                });

            });
            list.innerHTML = "";
        }

        // ⬇ DOWNLOAD
        async function downloadFile(url, filename) {
            if (!confirm("Scaricare file?")) return;
            try {
                const response = await fetch(url);
                const blob = await response.blob();

                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = filename;
                a.click();

                URL.revokeObjectURL(blobUrl);

            } catch (e) {
                alert("Errore download");
                console.log(e);
            }
        }
        // 🗑 DELETE
        function deleteFile(path) {
            if (confirm("Eliminare file?")) {
                storage.ref(path).delete().then(() => {
                    loadFiles();
                });
            }
        }

        // 👁 OPEN FILE
        function openFile(url, name) {
            window.open(url);
        }

        // 📎 FILE INFO
        document.getElementById("fileInput").addEventListener("change", () => {
            const f = document.getElementById("fileInput").files[0];
            if (!f) return;
            document.getElementById("fileInfo").innerText =
                f.name + " (" + (f.size / 1024 / 1024).toFixed(2) + " MB)";
        });

        // ⬆ UPLOAD
        function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return;

            const ref = storage.ref("StealthFiles/" + currentFolder + "/" + file.name);
            const task = ref.put(file);
            document.getElementById("progressContainer").style.display = "block";
            task.on("state_changed",
                snap => {
                    let p = (snap.bytesTransferred / snap.totalBytes) * 100;
                    document.getElementById("progressBar").value = p + "%";
                },
                err => alert("Errore upload"),
                () => {
                    alert("Upload completato");
                    loadFiles();
                    // ✅ RESET DOPO 1 SECONDO
                    setTimeout(() => {
                        resetUploadUI();
                    }, 1000);
                }
            );
        }
        function resetUploadUI() {
            document.getElementById("fileInput").value = "";
            document.getElementById("fileInfo").innerText = "";
            document.getElementById("progressBar").value = 0;
            document.getElementById("progressContainer").style.display = "none";
        }
        document.getElementById("fileInput").addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                document.getElementById("fileInfo").innerText =
                    "📄 " + file.name + " (" + Math.round(file.size / 1024) + " KB)";
            }
        });
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert("Link copiato");
            });
        }
        window.onpopstate = function () {

            if (document.getElementById("files").style.display === "block") {
                goBack();
            }

        };
    </script>

</body>

</html>
