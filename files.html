<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title translate="no">Stealth Files</title>
    <link rel="icon" href="logo.png">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .mainPage {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #files {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* HEADER */
        .header {
            padding: 15px;
            text-align: center;
            background: #000;
            font-size: 20px;
        }

        /* GRID CARTELLE */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .icon {
            font-size: 40px;
        }

        /* LISTA FILE */
        .fileList {
            padding: 10px;
        }

        .fileRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #161b22;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 14px;
            transition: 0.2s;
        }

        .fileRow:hover {
            background: #21262d;
            transform: translateY(-1px);
        }

        .leftSide {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .fileIcon {
            font-size: 26px;
            width: 32px;
            text-align: center;
        }

        .fileInfo {
            flex: 1;
            min-width: 0;
        }

        .fileName {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .fileMeta {
            font-size: 11px;
            opacity: 0.65;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .iconBtn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 10px;
            background: #30363d;
            color: white;
            cursor: pointer;
            transition: 0.2s;

            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .iconBtn:hover {
            background: #58a6ff;
        }

        .danger:hover {
            background: #da3633;
        }

        .iconBtn:focus,
        .iconBtn:focus-visible,
        .iconBtn:active {
            outline: none;
            box-shadow: none;
        }

        .iconBtn:active {
            transform: scale(0.94);
            opacity: 0.85;
        }


        /* UPLOAD */
        .uploadBox {
            padding: 10px;
        }

        .progress {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 4px;
        }

        .bar {
            height: 6px;
            background: #00ff99;
            width: 0%;
        }

        /* BOTTONI */
        .upload-btn {
            background: linear-gradient(45deg, #00ff99, #00ccff);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            transition: 0.2s;
        }

        .upload-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .upload-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }



        #fileInfo {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        progress {
            width: 100%;
            height: 8px;
            margin-top: 10px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modalBox {
            width: 85%;
            max-width: 320px;
            background: #161b22;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            animation: pop .18s ease;
        }

        .modalBtns {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .modalBtns button {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .modalBtns button:last-child {
            background: #00ff99;
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 25px;
            transform: translateX(-50%);
            background: #161b22;
            padding: 12px 18px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
        }

        .smallBtn {
            width: auto;
            padding: 12px 20px;
            margin: 10px auto;
            display: flex;
        }

        @keyframes pop {
            from {
                transform: scale(.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<div id="modal" class="modal">
    <div class="modalBox">
        <div id="modalText">Message</div>

        <div class="modalBtns">
            <button onclick="closeModal()">Cancel</button>
            <button id="confirmBtn">OK</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<body>

    <div class="mainPage">

        <div class="header" id="headerTitle">📂 Stealth Files</div>
        <!-- UPLOAD -->
        <div class="uploadBox" id="uploadBox" style="display:none;">

            <input type="file" id="fileInput" hidden>

            <button class="upload-btn" id="chooseBtn" onclick="document.getElementById('fileInput').click()">

                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">

                    <path d="M3 7h5l2 2h11v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>

                <span>Choose file</span>

            </button>


            <div id="fileInfo"></div>

            <div id="progressContainer" style="display:none;">
                <progress id="progressBar" value="0" max="100"></progress>
            </div>

            <button class="upload-btn" id="uploadBtn" onclick="uploadFile()">

                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">

                    <path d="M12 21V9" />
                    <path d="M7 14l5-5 5 5" />
                    <path d="M5 3h14" />

                </svg>

                <span>Upload</span>

            </button>

        </div>

        <!-- CARTELLE -->
        <div class="container" id="folders"></div>
        <button class="upload-btn smallBtn" id="newFolderBtn" onclick="askNewFolder()">

            ➕ New Folder

        </button>
        <div id="files"></div>

    </div>
    <!-- FILE -->
    <div class="fileList" id="files" style="display:none;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAClXwYAbKBec_Mc6XQT9ttNCQJTwlV2UU",
            authDomain: "stealthdeveloperfiles.firebaseapp.com",
            projectId: "stealthdeveloperfiles",
            storageBucket: "stealthdeveloperfiles.firebasestorage.app",
            messagingSenderId: "918965438979",
            appId: "1:918965438979:web:6634ab5caf697c116d9c36"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const storage = firebase.storage();

        let currentFolder = "";

        // LOGIN CHECK
        auth.onAuthStateChanged(user => {
            if (user) {
                loadFolders();
            } else {
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "login.html";
                    }
                }, 500);
            }
        });

        // 📂 CARICA CARTELLE
        function loadFolders() {
            const container = document.getElementById("folders");
            container.innerHTML = "";

            storage.ref("StealthFiles").listAll().then(res => {
                res.prefixes.forEach(folder => {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `<div class="icon">📁</div>${folder.name}`;
                    div.onclick = () => openFolder(folder.name);
                    container.appendChild(div);
                });
            });

        }

        // 📂 APRI CARTELLA
        function openFolder(name) {
            currentFolder = name;
            history.pushState({ folder: true }, "");
            document.getElementById("headerTitle").innerText =
                "📂 Stealth Files / " + name;
            document.getElementById("folders").style.display = "none";
            document.getElementById("files").style.display = "block";
            document.getElementById("uploadBox").style.display = "block";
            document.getElementById("newFolderBtn").style.display = "none";
            // 🔥 RESET QUI
            resetUploadUI();
            loadFiles();
        }

        // 🔙 TORNA
        function goBack() {
            document.getElementById("headerTitle").innerText =
                "📂 Stealth Files";
            document.getElementById("folders").style.display = "grid";
            document.getElementById("files").style.display = "none";
            document.getElementById("uploadBox").style.display = "none";
            document.getElementById("newFolderBtn").style.display = "block";
        }

        // 📄 CARICA FILE
        async function loadFiles() {

            const list = document.getElementById("files");
            list.innerHTML = "";

            const res = await storage
                .ref("StealthFiles/" + currentFolder)
                .listAll();

            // 🔥 tutto in parallelo
            const files = await Promise.all(

                res.items.map(async item => {

                    const [url, meta] = await Promise.all([
                        item.getDownloadURL(),
                        item.getMetadata()
                    ]);

                    return { item, url, meta };

                })
            );

            // 🔥 più recenti sopra
            files.sort((a, b) =>
                new Date(b.meta.timeCreated) -
                new Date(a.meta.timeCreated)
            );

            for (const file of files) {

                const item = file.item;
                const url = file.url;
                const meta = file.meta;

                let fullName = item.name;
                let shortName = fullName;

                if (shortName.length > 28) {
                    shortName =
                        shortName.substring(0, 18) +
                        "..." +
                        shortName.slice(-7);
                }

                const d = new Date(meta.timeCreated);

                const data = d.toLocaleDateString();
                const ora = d.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                let size;

                if (meta.size > 1024 * 1024) {
                    size = (meta.size / 1024 / 1024).toFixed(1) + " MB";
                } else {
                    size = Math.round(meta.size / 1024) + " KB";
                }

                let icon = "📄";

                if (fullName.match(/\.(jpg|jpeg|png|gif|webp)$/i)) icon = "🖼";
                else if (fullName.match(/\.(mp4|avi|mkv|mov)$/i)) icon = "🎬";
                else if (fullName.match(/\.(mp3|wav)$/i)) icon = "🎵";
                else if (fullName.match(/\.(zip|rar|7z)$/i)) icon = "🗜";
                else if (fullName.match(/\.(apk)$/i)) icon = "📱";
                else if (fullName.match(/\.(exe)$/i)) icon = "💻";
                else if (fullName.match(/\.(pdf)$/i)) icon = "📕";

                const row = document.createElement("div");
                row.className = "fileRow";

                row.innerHTML = `
        <div class="leftSide">

            <div class="fileIcon">${icon}</div>

            <div class="fileInfo">

                <div class="fileName"
                onclick="openFile('${url}','${fullName}')">
                ${shortName}
                </div>

                <div class="fileMeta">
                    ${data} • ${ora} • ${size}
                </div>

            </div>

        </div>

        <div class="actions">

        <button class="iconBtn"
            onclick="downloadFile('${url}','${fullName}')">

            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
            </svg>

        </button>

        <button class="iconBtn"
            onclick="copyLink('${url}')">

            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"></path>
            <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"></path>
            </svg>

        </button>

        <button class="iconBtn danger"
            onclick="deleteFile('${item.fullPath}')">

            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            </svg>

        </button>

        </div>
        `;

                list.appendChild(row);
            }
        }

        // ⬇ DOWNLOAD
        async function downloadFile(url, filename) {
            showConfirm("Download file?", async () => {

                try {
                    const response = await fetch(url);
                    const blob = await response.blob();

                    const blobUrl = URL.createObjectURL(blob);

                    const a = document.createElement("a");
                    a.href = blobUrl;
                    a.download = filename;
                    a.click();

                    URL.revokeObjectURL(blobUrl);
                } catch (e) {
                    showToast("Download error");
                    console.log(e);
                }
            });
        }
        // 🗑 DELETE
        function deleteFile(path) {
            showConfirm("Delete file?", () => {
                storage.ref(path).delete().then(() => {
                    loadFiles();
                });
            });
        }

        // 👁 OPEN FILE
        function openFile(url, name) {
            window.open(url);
        }

        // 📎 FILE INFO
        document.getElementById("fileInput").addEventListener("change", () => {
            const f = document.getElementById("fileInput").files[0];
            if (!f) return;
            document.getElementById("fileInfo").innerText =
                f.name + " (" + (f.size / 1024 / 1024).toFixed(2) + " MB)";
        });

        // ⬆ UPLOAD
        function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return;
            const btn = document.getElementById("uploadBtn");
            const chooseBtn = document.getElementById("chooseBtn");
            btn.disabled = true;
            chooseBtn.disabled = true;

            btn.innerText = "⏳ Uploading...";
            chooseBtn.innerText = "⏳ Locked";

            btn.style.opacity = "0.6";
            chooseBtn.style.opacity = "0.6";

            btn.style.cursor = "not-allowed";
            chooseBtn.style.cursor = "not-allowed";
            const ref = storage.ref("StealthFiles/" + currentFolder + "/" + file.name);
            const task = ref.put(file);
            document.getElementById("progressContainer").style.display = "block";
            task.on("state_changed",
                snap => {
                    let p = (snap.bytesTransferred / snap.totalBytes) * 100;
                    document.getElementById("progressBar").style.width = p + "%";
                },
                err => {

                    btn.disabled = false;
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                    chooseBtn.disabled = false;
                    chooseBtn.style.opacity = "1";
                    resetUploadButtons();
                    showToast("Upload error");
                },
                () => {
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                    chooseBtn.disabled = false;
                    chooseBtn.style.opacity = "1";
                    resetUploadButtons();
                    showToast("✔ Upload completed");
                    loadFiles();
                    // ✅ RESET DOPO 1 SECONDO
                    setTimeout(() => {
                        resetUploadUI();
                    }, 1000);
                }
            );
        }
        function resetUploadButtons() {

            chooseBtn.innerHTML = `
                <svg viewBox="0 0 24 24"
                width="18" height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M3 7h5l2 2h11v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                </svg>
                <span>Choose file</span>
            `;

            uploadBtn.innerHTML = `
                <svg viewBox="0 0 24 24"
                width="18" height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 21V9"/>
                <path d="M7 14l5-5 5 5"/>
                <path d="M5 3h14"/>
                </svg>
                <span>Upload</span>
            `;

        }
        function resetUploadUI() {
            document.getElementById("fileInput").value = "";
            document.getElementById("fileInfo").innerText = "";
            document.getElementById("progressBar").value = 0;
            document.getElementById("progressContainer").style.display = "none";
        }
        document.getElementById("fileInput").addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                document.getElementById("fileInfo").innerText =
                    "📄 " + file.name + " (" + Math.round(file.size / 1024) + " KB)";
            }
        });
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast("✔ Link copied");
            });
        }
        window.onpopstate = function () {

            if (document.getElementById("files").style.display === "block") {
                goBack();
            }

        };
        function showConfirm(text, callback) {

            document.getElementById("modal").style.display = "flex";
            document.getElementById("modalText").innerText = text;

            document.getElementById("confirmBtn").onclick = () => {
                closeModal();
                callback();
            };
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function showToast(text) {

            const t = document.getElementById("toast");

            t.innerText = text;
            t.style.display = "block";

            setTimeout(() => {
                t.style.display = "none";
            }, 1800);
        }
        function askNewFolder() {

            document.getElementById("folderModal").style.display = "flex";
            document.getElementById("folderName").value = "";
            document.getElementById("folderName").focus();
        }

        function closeFolderModal() {
            document.getElementById("folderModal").style.display = "none";
        }

        async function createFolder() {

            let name =
                document.getElementById("folderName").value.trim();

            if (!name) return;

            name = name.replace(/[.#$\[\]/]/g, "");

            try {

                await storage
                    .ref("StealthFiles/" + name + "/.keep")
                    .putString("folder");

                closeFolderModal();

                loadFolders();

                showToast("✔ Folder created");

            } catch (e) {

                showToast("Error");
                console.log(e);
            }
        }
    </script>
    <div id="folderModal" class="modal">

        <div class="modalBox">

            <div style="font-size:18px;font-weight:bold;">
                Create Folder
            </div>

            <input id="folderName" placeholder="Folder name" style="
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            box-sizing:border-box;
            font-size:16px;">

            <div class="modalBtns">

                <button onclick="closeFolderModal()">
                    Cancel
                </button>

                <button onclick="createFolder()">
                    Create
                </button>

            </div>

        </div>

    </div>
</body>

</html>
