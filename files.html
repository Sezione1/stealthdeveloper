<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stealth Files</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  background: #000;
  text-align: center;
  font-size: 20px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  background: rgba(0,255,150,0.2);
}

/* ICONA */
.icon {
  font-size: 35px;
}

/* NOME */
.name {
  margin-top: 10px;
  font-size: 14px;
}

/* DESC */
.desc {
  font-size: 12px;
  opacity: 0.7;
}

/* LOGOUT */
.logout {
  margin: 10px;
  padding: 10px;
  width: calc(100% - 20px);
  background: red;
  border: none;
  border-radius: 8px;
  color: white;
}

/* SEZIONE */
.section-title {
  margin: 10px 15px;
  font-size: 16px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">📂 Stealth Cloud</div>

<button class="logout" onclick="logout()">Logout</button>

<div class="section-title">📱 Apps & APK</div>

<div class="container">

  <div class="card" onclick="openLink('LINK_SAFEFILES')">
    <div class="icon">🔐</div>
    <div class="name">SafeFiles APK</div>
    <div class="desc">Encrypted file app</div>
  </div>

  <div class="card" onclick="openLink('LINK_AUTOVELOX')">
    <div class="icon">🚗</div>
    <div class="name">Autovelox</div>
    <div class="desc">Speed radar alerts</div>
  </div>

</div>

<div class="section-title">📦 Backup</div>

<div class="container">

  <div class="card" onclick="openLink('LINK_BACKUP1')">
    <div class="icon">📦</div>
    <div class="name">Backup 2026</div>
    <div class="desc">Encrypted data</div>
  </div>

</div>

<div class="section-title">🛠 Tools</div>

<div class="container">

  <div class="card" onclick="openLink('LINK_TOOL1')">
    <div class="icon">🧰</div>
    <div class="name">Utility Tool</div>
    <div class="desc">Various tools</div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAClXwYAbKBec_Mc6XQT9ttNCQJTwlV2UU",
  authDomain: "stealthdeveloperfiles.firebaseapp.com",
  projectId: "stealthdeveloperfiles",
  storageBucket: "stealthdeveloperfiles.firebasestorage.app",
  messagingSenderId: "918965438979",
  appId: "1:918965438979:web:6634ab5caf697c116d9c36"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

function openLink(link) {
  window.open(link, "_blank");
}

function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
