<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stealth Drive</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

.header {
  padding: 15px;
  background: #000;
  text-align: center;
}

.upload {
  padding: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #00ff99;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  box-sizing: border-box;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  padding: 15px;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

small {
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">📁 Stealth Drive</div>

<div class="upload">
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">⬆ Upload</button>
</div>

<div class="container" id="fileList"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAClXwYAbKBec_Mc6XQT9ttNCQJTwlV2UU",
  authDomain: "stealthdeveloperfiles.firebaseapp.com",
  projectId: "stealthdeveloperfiles",
  storageBucket: "stealthdeveloperfiles.firebasestorage.app",
  messagingSenderId: "918965438979",
  appId: "1:918965438979:web:6634ab5caf697c116d9c36"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const storage = firebase.storage();

auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
  loadFiles();
});

// 📤 UPLOAD
function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  const ref = storage.ref("StealthFiles/" + file.name);

  ref.put(file).then(() => {
    alert("Upload completato 🔥");
    loadFiles();
  });
}

// 📥 LISTA FILE
function loadFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  storage.ref("StealthFiles").listAll().then(res => {
    res.items.forEach(item => {

      item.getDownloadURL().then(url => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          📄 <b>${item.name}</b><br>
          <small onclick="window.open('${url}')">⬇ Download</small>
        `;

        list.appendChild(div);
      });

    });
  });
}
</script>

</body>
</html>
